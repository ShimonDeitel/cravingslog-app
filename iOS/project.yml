name: CravingsLog
options:
  bundleIdPrefix: com.shimondeitel.cravingslog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CravingsLog:
    type: application
    platform: iOS
    sources:
      - path: CravingsLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cravingslog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CravingsLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CravingsLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CravingsLogTests
    dependencies:
      - target: CravingsLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cravingslog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CravingsLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CravingsLogUITests
    dependencies:
      - target: CravingsLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cravingslog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CravingsLog:
    build:
      targets:
        CravingsLog: all
        CravingsLogTests: [test]
        CravingsLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CravingsLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CravingsLog.storekit
      targets:
        - CravingsLogTests
        - CravingsLogUITests
    archive:
      config: Release
